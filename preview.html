<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEALTOX | COMING SOON</title>
  <link rel="icon" type="image/png" href="./public/favicon.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Pretendard Webfont -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden !important;
      background-color: #050508;
      color: #FFFFFF;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      user-select: none;
    }
    .bg-radial-vignette {
      background: radial-gradient(circle at center, transparent 40%, rgba(5, 5, 8, 0.9) 100%);
    }
    @keyframes fadeBlurIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(12px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
    }
    @keyframes fadeBlurInSub {
      0% { opacity: 0; transform: translateY(15px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
    }
    @keyframes subtleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .animate-logo {
      animation: fadeBlurIn 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }
    .animate-sub {
      animation: fadeBlurInSub 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
    }
    .floating-text {
      animation: subtleFloat 6s ease-in-out infinite;
    }
  </style>
</head>
<body class="antialiased bg-[#050508] text-white flex items-center justify-center relative overflow-hidden">

  <!-- Interactive Canvas Background -->
  <canvas id="teaser-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

  <!-- Vignette Overlay -->
  <div class="absolute inset-0 z-10 bg-radial-vignette pointer-events-none opacity-40"></div>

  <!-- Centered Content -->
  <div class="relative z-20 flex flex-col items-center justify-center text-center px-6 pointer-events-none">
    
    <div class="opacity-0 animate-logo">
      <h1 class="floating-text text-6xl sm:text-9xl lg:text-[140px] font-black tracking-[0.22em] sm:tracking-[0.32em] text-transparent bg-clip-text bg-gradient-to-b from-white via-slate-100 to-white/60 drop-shadow-[0_10px_35px_rgba(255,255,255,0.25)] uppercase leading-none pl-[0.22em] sm:pl-[0.32em]">
        HEALTOX
      </h1>
    </div>

    <div class="opacity-0 animate-sub mt-6 sm:mt-10">
      <span class="floating-text inline-block text-xs sm:text-base lg:text-lg font-extrabold uppercase tracking-[0.6em] sm:tracking-[0.8em] text-white/70 pl-[0.6em] sm:pl-[0.8em] drop-shadow-lg">
        COMING SOON
      </span>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('teaser-canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let targetMouseX = width / 2;
    let targetMouseY = height / 2;
    let currentMouseX = width / 2;
    let currentMouseY = height / 2;

    window.addEventListener('mousemove', (e) => {
      targetMouseX = e.clientX;
      targetMouseY = e.clientY;
    });

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    const COLORS = [
      "rgba(37, 99, 235, 0.45)",   // Electric Blue
      "rgba(6, 182, 212, 0.45)",   // Aqua
      "rgba(16, 185, 129, 0.4)",   // Emerald Green
      "rgba(132, 204, 22, 0.35)",  // Fresh Lime
      "rgba(139, 92, 246, 0.35)",  // Subtle Purple
      "rgba(244, 63, 94, 0.3)",    // Soft Coral
    ];

    const blobs = [
      { x: width * 0.3, y: height * 0.4, radius: Math.min(width, height) * 0.38, vx: 0.25, vy: 0.18, color: COLORS[0], phase: 0, speed: 0.008 },
      { x: width * 0.7, y: height * 0.3, radius: Math.min(width, height) * 0.42, vx: -0.2, vy: 0.22, color: COLORS[1], phase: Math.PI / 3, speed: 0.006 },
      { x: width * 0.5, y: height * 0.7, radius: Math.min(width, height) * 0.35, vx: 0.18, vy: -0.25, color: COLORS[2], phase: Math.PI / 2, speed: 0.009 },
      { x: width * 0.2, y: height * 0.8, radius: Math.min(width, height) * 0.32, vx: 0.15, vy: -0.15, color: COLORS[3], phase: Math.PI, speed: 0.007 },
      { x: width * 0.8, y: height * 0.75, radius: Math.min(width, height) * 0.36, vx: -0.22, vy: -0.18, color: COLORS[4], phase: Math.PI * 1.2, speed: 0.005 },
      { x: width * 0.5, y: height * 0.25, radius: Math.min(width, height) * 0.3, vx: 0.1, vy: 0.15, color: COLORS[5], phase: Math.PI * 1.5, speed: 0.01 },
    ];

    const particles = [];
    for (let i = 0; i < 55; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 2.5 + 0.8,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -Math.random() * 0.4 - 0.15,
        alpha: Math.random() * 0.6 + 0.2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
      });
    }

    let time = 0;
    function render() {
      time += 0.012;

      currentMouseX += (targetMouseX - currentMouseX) * 0.03;
      currentMouseY += (targetMouseY - currentMouseY) * 0.03;

      const mouseOffsetX = (currentMouseX - width / 2) * 0.06;
      const mouseOffsetY = (currentMouseY - height / 2) * 0.06;

      ctx.fillStyle = "#050508";
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = "screen";

      blobs.forEach((blob, idx) => {
        blob.phase += blob.speed;
        blob.x += Math.sin(blob.phase) * blob.vx * 1.5;
        blob.y += Math.cos(blob.phase) * blob.vy * 1.5;

        const depth = (idx + 1) * 0.15;
        const drawX = blob.x + mouseOffsetX * depth;
        const drawY = blob.y + mouseOffsetY * depth;
        const pulseRadius = blob.radius + Math.sin(blob.phase * 1.5) * 25;

        const grad = ctx.createRadialGradient(
          drawX, drawY, pulseRadius * 0.05,
          drawX, drawY, pulseRadius
        );
        grad.addColorStop(0, blob.color);
        grad.addColorStop(0.5, blob.color.replace(/[\d\.]+\)$/, "0.18)"));
        grad.addColorStop(1, "rgba(5, 5, 8, 0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(drawX, drawY, pulseRadius, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.globalCompositeOperation = "lighter";
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        ctx.strokeStyle = i % 2 === 0 ? "rgba(34, 211, 238, 0.07)" : "rgba(164, 244, 207, 0.06)";
        ctx.beginPath();
        const yOffset = height * 0.3 * (i + 1) + Math.sin(time + i) * 30;
        ctx.moveTo(0, yOffset);

        for (let x = 0; x <= width; x += 40) {
          const waveY = Math.sin(x * 0.004 + time + i * 1.2) * 20 + Math.cos(x * 0.008 + time * 0.8) * 15;
          ctx.lineTo(x, yOffset + waveY);
        }
        ctx.stroke();
      }

      ctx.globalCompositeOperation = "source-over";
      particles.forEach((p) => {
        p.x += p.vx + Math.sin(time + p.y * 0.01) * 0.15;
        p.y += p.vy;

        if (p.y < -10) {
          p.y = height + 10;
          p.x = Math.random() * width;
        }

        ctx.fillStyle = p.color.replace(/[\d\.]+\)$/, `${p.alpha})`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
